name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# srrg-lean depends on ../ugp-physics-lean which depends on ../ugp-lean — mirror local layout.
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workspace/srrg-lean
    steps:
      - name: Checkout ugp-lean
        uses: actions/checkout@v4
        with:
          repository: novaspivack/ugp-lean
          path: workspace/ugp-lean

      - name: Checkout ugp-physics-lean
        uses: actions/checkout@v4
        with:
          repository: novaspivack/ugp-physics-lean
          path: workspace/ugp-physics-lean

      - name: Checkout srrg-lean
        uses: actions/checkout@v4
        with:
          path: workspace/srrg-lean

      - name: Install Elan
        run: |
          set -euo pipefail
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Select toolchain
        working-directory: workspace/srrg-lean
        run: elan toolchain install "$(tr -d '\n' < lean-toolchain)"

      - name: Mathlib cache (prebuilt artifacts)
        run: lake exe cache get

      - name: Build srrg-lean
        run: lake build
